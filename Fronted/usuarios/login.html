<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Quantum Gaming</title>
    <link rel="stylesheet" href="../style.css">
</head>

<body>
    <header>
        <h1><a href="../index.html" class="brand-link">Quantum Gaming</a></h1>
    </header>

    <main>
        <section class="login-container" aria-label="Acceso de usuario">
            <article class="login-card">
                <h2>Bienvenido</h2>
                <p>Ingresa tus datos para continuar.</p>
                <form id="auth-form" class="auth-form">
                    <p id="auth-error" aria-live="polite"></p>
                    <section class="form-group">
                        <label for="email">Correo Electrónico</label>
                        <input type="email" id="email" name="email" placeholder="Ariel@gmail.com" required>
                    </section>
                    <section class="form-group">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" name="password" placeholder="••••••••" required>
                    </section>
                    <button type="submit" id="auth-submit-btn">Iniciar Sesión</button>
                    <p class="auth-switch">
                        <a href="#" id="toggle-auth-mode">¿No tienes cuenta? Regístrate aquí</a>
                    </p>
                </form>
            </article>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Quantum Gaming. mat1520.</p>
    </footer>
    <script src="../main.js"></script>
</body>

</html>
